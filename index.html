<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>指数红绿灯 - 全年PE走势</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f6f8;
            padding: 12px;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 20px;
            color: #222;
            font-weight: 600;
        }
        .header p {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }
        #valuationChart {
            width: 100%;
            height: 440px;
            background: #fff;
            border-radius: 10px;
            padding: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .list-wrap {
            background: #fff;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .list-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .index-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f2f2f2;
            flex-wrap: wrap;
        }
        .index-item:last-child {
            border-bottom: none;
        }
        .index-name {
            flex: 1;
            font-size: 15px;
            color: #222;
        }
        .index-data {
            flex: 1.4;
            text-align: center;
            font-size: 14px;
            color: #555;
        }
        .status-tag {
            flex: 0.8;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
        }
        .tip {
            width: 100%;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .tag-low { color: #00b42a; }
        .tag-mid { color: #ff7d00; }
        .tag-high { color: #f53f3f; }
    </style>
</head>
<body>
    <div class="header">
        <h1>指数红绿灯</h1>
        <p>全年历史PE走势 | 全局统一估值坐标</p>
    </div>

    <div id="valuationChart"></div>

    <div class="list-wrap">
        <div class="list-title">指数估值一览</div>
        <div id="indexList"></div>
    </div>

<script>
// 一、全年12个月日期（X轴，清晰竖排）
const dateList = [
    "2025-01","2025-02","2025-03","2025-04",
    "2025-05","2025-06","2025-07","2025-08",
    "2025-09","2025-10","2025-11","2025-12"
];

// 二、一年真实风格PE数据 + 各指数历史极值（贴合市场真实区间）
const indexData = [
    {
        name: "沪深300",
        peHistory: [10.1, 10.3, 10.8, 11.2, 11.5, 11.3, 10.9, 10.7, 10.5, 10.2, 10.4, 10.6],
        minPE: 8.2,
        maxPE: 17.8
    },
    {
        name: "中证500",
        peHistory: [15.2, 15.8, 16.5, 17.1, 17.9, 18.3, 18.1, 17.7, 17.2, 16.8, 17.0, 17.4],
        minPE: 12.3,
        maxPE: 29.6
    },
    {
        name: "创业板指",
        peHistory: [32.5, 33.8, 34.6, 35.2, 34.8, 33.9, 33.1, 32.7, 33.3, 34.1, 34.7, 35.0],
        minPE: 20.5,
        maxPE: 59.2
    },
    {
        name: "中证消费",
        peHistory: [29.6, 30.5, 31.2, 31.9, 32.5, 32.8, 32.6, 32.1, 31.7, 31.3, 31.8, 32.2],
        minPE: 22.4,
        maxPE: 47.5
    },
    {
        name: "中证医药",
        peHistory: [21.3, 22.1, 22.9, 23.5, 24.1, 24.6, 24.3, 23.8, 23.2, 22.7, 23.1, 23.6],
        minPE: 16.2,
        maxPE: 35.8
    }
];

// 三、计算单指数PE区间分位
function getPercent(nowPE, minPE, maxPE) {
    if (maxPE === minPE) return 50;
    let pct = (nowPE - minPE) / (maxPE - minPE) * 100;
    return Math.max(0, Math.min(100, pct));
}

// 四、全局Y轴极值（所有指数PE最大/最小，统一坐标系）
const allMinPE = Math.min(...indexData.map(item => item.minPE));
const allMaxPE = Math.max(...indexData.map(item => item.maxPE));
const totalRange = allMaxPE - allMinPE;
const line30 = allMinPE + totalRange * 0.3;
const line70 = allMinPE + totalRange * 0.7;

// 五、渲染下方估值列表+红绿灯
const listDom = document.getElementById('indexList');
indexData.forEach(item => {
    const nowPE = item.peHistory[item.peHistory.length - 1];
    const pct = getPercent(nowPE, item.minPE, item.maxPE);
    let statusText, className, tip;

    if (pct < 30) {
        statusText = "低估 🟢";
        className = "tag-low";
        tip = `当前PE${nowPE}，处于历史低位`;
    } else if (pct < 70) {
        statusText = "中性 🟡";
        className = "tag-mid";
        tip = `当前PE${nowPE}，估值适中`;
    } else {
        statusText = "高估 🔴";
        className = "tag-high";
        tip = `当前PE${nowPE}，处于历史高位`;
    }

    const html = `
        <div class="index-item">
            <div class="index-name">${item.name}</div>
            <div class="index-data">当前PE：${nowPE} | 区间占比：${pct.toFixed(1)}%</div>
            <div class="status-tag ${className}">${statusText}</div>
            <div class="tip">${tip}（历史区间：${item.minPE} ~ ${item.maxPE}）</div>
        </div>
    `;
    listDom.innerHTML += html;
});

// 六、初始化图表
const chartDom = document.getElementById('valuationChart');
const myChart = echarts.init(chartDom);

// 多折线配色
const colorList = ['#1677ff', '#00b42a', '#f53f3f', '#ff7d00', '#722ed1'];
const seriesList = indexData.map((item, idx) => {
    return {
        name: item.name,
        type: 'line',
        data: item.peHistory,
        smooth: true,
        symbol: 'circle',
        symbolSize: 5,
        lineStyle: { width: 2, color: colorList[idx] },
        itemStyle: { color: colorList[idx] }
    };
});

const option = {
    tooltip: { trigger: 'axis' },
    legend: { data: indexData.map(d => d.name), top: 0 },
    // 左右无空白，紧贴边界
    grid: {
        left: 0,
        right: 0,
        top: '8%',
        bottom: '12%',
        containLabel: false
    },
    xAxis: {
        type: 'category',
        data: dateList,
        boundaryGap: false, // 左右两端不留空白
        axisLabel: {
            rotate: 90,        // 日期竖排
            fontSize: 12,      // 字号加大，更清晰
            color: '#333'
        },
        axisLine: { lineStyle: { color: '#ccc' } }
    },
    yAxis: {
        type: 'value',
        name: 'PE',
        min: allMinPE,
        max: allMaxPE,
        boundaryGap: false,
        // Y轴文字 显示在图表内部左侧
        axisLabel: {
            inside: true,
            position: 'left',
            fontSize: 11,
            color: '#666'
        },
        splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } },
        axisLine: { show: false }
    },
    // 30% / 70% 估值分割虚线
    markLine: {
        silent: true,
        lineStyle: { color: '#999', type: 'dashed' },
        label: { position: 'end', fontSize: 10, color: '#666' },
        data: [
            { yAxis: line30, name: '30%' },
            { yAxis: line70, name: '70%' }
        ]
    },
    series: seriesList
};

myChart.setOption(option);
window.addEventListener('resize', () => myChart.resize());
</script>
</body>
</html>
