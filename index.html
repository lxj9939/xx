<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>指数红绿灯 - 多指数PE走势</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f6f8;
            padding: 12px;
        }
        .header {
            text-align: center;
            padding: 15px 0;
            margin-bottom: 12px;
        }
        .header h1 {
            font-size: 20px;
            color: #222;
            font-weight: 600;
        }
        .header p {
            font-size: 13px;
            color: #999;
            margin-top: 4px;
        }
        #valuationChart {
            width: 100%;
            height: 420px;
            background: #fff;
            border-radius: 10px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            margin-bottom: 15px;
        }
        .list-wrap {
            background: #fff;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .list-title {
            font-size: 16px;
            color: #333;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid #eee;
        }
        .index-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #f2f2f2;
            flex-wrap: wrap;
        }
        .index-item:last-child {
            border-bottom: none;
        }
        .index-name {
            flex: 1;
            font-size: 15px;
            color: #222;
        }
        .index-data {
            flex: 1.4;
            text-align: center;
            font-size: 14px;
            color: #555;
        }
        .status-tag {
            flex: 0.8;
            text-align: right;
            font-size: 14px;
            font-weight: bold;
        }
        .tip {
            width: 100%;
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .tag-low { color: #00b42a; }
        .tag-mid { color: #ff7d00; }
        .tag-high { color: #f53f3f; }
    </style>
</head>
<body>
    <div class="header">
        <h1>指数红绿灯</h1>
        <p>多指数PE历史走势 | 全局统一PE坐标</p>
    </div>

    <div id="valuationChart"></div>

    <div class="list-wrap">
        <div class="list-title">指数估值一览</div>
        <div id="indexList"></div>
    </div>

<script>
// 1. 时间轴数据（X轴日期）
const dateList = [
    "2025-01", "2025-02", "2025-03", "2025-04",
    "2025-05", "2025-06", "2025-07", "2025-08"
];

// 2. 各指数历史PE数据 + 单指数历史极值
const indexData = [
    {
        name: "沪深300",
        peHistory: [9.2, 9.8, 10.5, 10.9, 11.25, 11.0, 10.7, 11.25],
        minPE: 8.0,
        maxPE: 18.0
    },
    {
        name: "中证500",
        peHistory: [14.2, 15.5, 16.1, 17.3, 18.0, 18.62, 18.2, 18.62],
        minPE: 12.0,
        maxPE: 30.0
    },
    {
        name: "创业板指",
        peHistory: [26.5, 28.2, 30.1, 32.6, 33.8, 34.5, 34.9, 35.10],
        minPE: 20.0,
        maxPE: 60.0
    },
    {
        name: "中证消费",
        peHistory: [26.1, 27.8, 29.5, 30.8, 31.6, 32.1, 32.3, 32.45],
        minPE: 22.0,
        maxPE: 48.0
    },
    {
        name: "中证医药",
        peHistory: [18.5, 20.2, 21.6, 22.9, 23.7, 24.2, 24.5, 24.80],
        minPE: 16.0,
        maxPE: 36.0
    }
];

// 3. 计算单指数PE区间分位
function getPercent(nowPE, minPE, maxPE) {
    if (maxPE === minPE) return 50;
    let pct = (nowPE - minPE) / (maxPE - minPE) * 100;
    return Math.max(0, Math.min(100, pct));
}

// 4. 计算【全局统一Y轴】极值：所有指数历史PE的最小/最大值
const allMinPE = Math.min(...indexData.map(item => item.minPE));
const allMaxPE = Math.max(...indexData.map(item => item.maxPE));
const totalRange = allMaxPE - allMinPE;
// 全局30%、70%对应PE数值（估值分界线）
const line30 = allMinPE + totalRange * 0.3;
const line70 = allMinPE + totalRange * 0.7;

// 5. 渲染下方列表+红绿灯
const listDom = document.getElementById('indexList');
indexData.forEach(item => {
    const nowPE = item.peHistory[item.peHistory.length - 1];
    const pct = getPercent(nowPE, item.minPE, item.maxPE);
    let statusText, className, tip;

    if (pct < 30) {
        statusText = "低估 🟢";
        className = "tag-low";
        tip = `当前PE${nowPE}，处于历史低位`;
    } else if (pct < 70) {
        statusText = "中性 🟡";
        className = "tag-mid";
        tip = `当前PE${nowPE}，估值适中`;
    } else {
        statusText = "高估 🔴";
        className = "tag-high";
        tip = `当前PE${nowPE}，处于历史高位`;
    }

    const html = `
        <div class="index-item">
            <div class="index-name">${item.name}</div>
            <div class="index-data">当前PE：${nowPE} | 区间占比：${pct.toFixed(1)}%</div>
            <div class="status-tag ${className}">${statusText}</div>
            <div class="tip">${tip}（历史区间：${item.minPE} ~ ${item.maxPE}）</div>
        </div>
    `;
    listDom.innerHTML += html;
});

// 6. ECharts 图表初始化
const chartDom = document.getElementById('valuationChart');
const myChart = echarts.init(chartDom);

// 组装多系列折线数据（每个指数一条线）
const seriesList = indexData.map((item, idx) => {
    const colorArr = ['#1677ff', '#00b42a', '#f53f3f', '#ff7d00', '#722ed1'];
    return {
        name: item.name,
        type: 'line',
        data: item.peHistory,
        smooth: true,
        symbol: 'circle',
        symbolSize: 5,
        lineStyle: { width: 2, color: colorArr[idx % colorArr.length] },
        itemStyle: { color: colorArr[idx % colorArr.length] }
    };
});

const option = {
    tooltip: {
        trigger: 'axis'
    },
    legend: {
        data: indexData.map(item => item.name),
        top: 0
    },
    grid: {
        left: '3%',
        right: '4%',
        bottom: '12%',
        containLabel: true
    },
    xAxis: {
        type: 'category',
        data: dateList,
        // X轴日期 竖排显示
        axisLabel: {
            rotate: 90,
            fontSize: 11
        },
        axisLine: { lineStyle: { color: '#eee' } }
    },
    yAxis: {
        type: 'value',
        name: 'PE 数值',
        min: allMinPE,
        max: allMaxPE,
        splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } },
        axisLine: { lineStyle: { color: '#eee' } }
    },
    // 估值分割线 30% / 70%
    markLine: {
        silent: true,
        lineStyle: { color: '#ccc', type: 'dashed' },
        label: { position: 'end', fontSize: 11, color: '#999' },
        data: [
            { yAxis: line30, name: '30% 低估线' },
            { yAxis: line70, name: '70% 高估线' }
        ]
    },
    series: seriesList
};

myChart.setOption(option);
window.addEventListener('resize', () => myChart.resize());
</script>
</body>
</html>
