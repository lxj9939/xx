<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>指数红绿灯 - 纯前端真实行情</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f6f8;
            padding: 12px;
        }
        .chart-item {
            width: 100%;
            height: 600px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .tip {
            margin-bottom: 8px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="tip">加载中，正在获取真实行情数据...</div>
    <div id="chartContainer" class="chart-item"></div>

<script>
const chartDom = document.getElementById('chartContainer');
const tipDom = document.querySelector('.tip');
let myChart = echarts.init(chartDom);
const lineColor = ['#00b42a','#73c000','#ffd700','#ff7d00','#f53f3f'];

// 配置需要获取的指数（东方财富代码）
const indexList = [
    { name: "沪深300", code: "1.000300" },
    { name: "中证500", code: "1.000905" },
    { name: "创业板指", code: "0.399006" },
    { name: "中证消费", code: "1.000932" },
    { name: "中证医药", code: "1.000933" },
    { name: "半导体", code: "1.931786" },
    { name: "新能源", code: "1.931151" },
    { name: "银行", code: "1.931787" },
    { name: "券商", code: "1.931785" },
    { name: "白酒", code: "1.931817" },
    { name: "军工", code: "1.931066" },
    { name: "地产", code: "1.931775" }
];

// 估值五档分级
function getLevel(val, min, max) {
    if (max === min) return 2;
    const pct = (val - min) / (max - min) * 100;
    if (pct < 20) return 0;
    if (pct < 40) return 1;
    if (pct < 60) return 2;
    if (pct < 80) return 3;
    return 4;
}

// JSONP 请求函数（解决跨域）
function jsonp(url, callbackName = 'jsonpCallback') {
    return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        window[callbackName] = (res) => {
            delete window[callbackName];
            document.body.removeChild(script);
            resolve(res);
        };
        script.onerror = () => {
            delete window[callbackName];
            document.body.removeChild(script);
            reject('接口请求失败');
        };
        script.src = `${url}&callback=${callbackName}`;
        document.body.appendChild(script);
    });
}

// 单指数获取近一年数据
async function getIndexData(code) {
    const url = `https://push2.eastmoney.com/api/qt/stock/kline/get?secid=${code}&fields1=f1&fields2=f51,f53&klt=101&fqt=0&beg=0&end=0`;
    const res = await jsonp(url);
    if (!res?.data?.klines) return [];
    // 截取近365条日线数据
    return res.data.klines.slice(-365);
}

// 主逻辑：批量拉取数据 + 统计 + 渲染
async function main() {
    try {
        let allRecord = [];
        // 循环拉取所有指数数据
        for (const item of indexList) {
            const klineList = await getIndexData(item.code);
            if (klineList.length === 0) continue;

            const dateArr = [];
            const valArr = [];
            klineList.forEach(k => {
                const [date, close] = k.split(',');
                dateArr.push(date);
                valArr.push(parseFloat(close));
            });

            const minVal = Math.min(...valArr);
            const maxVal = Math.max(...valArr);
            // 按日期+分级存入
            dateArr.forEach((date, idx) => {
                const level = getLevel(valArr[idx], minVal, maxVal);
                allRecord.push({ date, level });
            });
        }

        if (allRecord.length === 0) {
            tipDom.innerText = "数据获取失败，请稍后重试";
            return;
        }

        // 按日期聚合统计各档位数量
        const dateSet = [...new Set(allRecord.map(d => d.date))].sort();
        const level0 = [], level1 = [], level2 = [], level3 = [], level4 = [];

        dateSet.forEach(date => {
            const dayData = allRecord.filter(d => d.date === date);
            level0.push(dayData.filter(d => d.level === 0).length);
            level1.push(dayData.filter(d => d.level === 1).length);
            level2.push(dayData.filter(d => d.level === 2).length);
            level3.push(dayData.filter(d => d.level === 3).length);
            level4.push(dayData.filter(d => d.level === 4).length);
        });

        tipDom.innerText = "数据加载完成";
        // 渲染图表
        renderChart(dateSet, level0, level1, level2, level3, level4);
    } catch (err) {
        tipDom.innerText = `加载异常：${err}`;
        console.error(err);
    }
}

// 渲染图表（完全沿用你之前的样式配置）
function renderChart(dateList, l0, l1, l2, l3, l4) {
    const last0 = l0.at(-1) || 0;
    const last1 = l1.at(-1) || 0;
    const last2 = l2.at(-1) || 0;
    const last3 = l3.at(-1) || 0;
    const last4 = l4.at(-1) || 0;

    const seriesName = [
        `极低估：${last0}`,
        `低估：${last1}`,
        `中性：${last2}`,
        `高估：${last3}`,
        `极高估：${last4}`
    ];

    const series = [l0, l1, l2, l3, l4].map((data, idx) => ({
        name: seriesName[idx],
        type: 'line',
        data: data,
        smooth: true,
        symbol: 'none',
        lineStyle: { width: 1.8, color: lineColor[idx] }
    }));

    const allData = [...l0, ...l1, ...l2, ...l3, ...l4];
    const yMin = Math.min(...allData);
    const yMax = Math.max(...allData);

    const option = {
        title: {
            text: '全行业五档估值数量统计（真实行情）',
            left: 'left',
            top: 0,
            textStyle: { fontSize: 14, fontWeight: 'bold' }
        },
        tooltip: { trigger: 'axis' },
        legend: {
            data: seriesName,
            top: 0,
            right: 10,
            textStyle: { fontSize: 12, fontWeight: 'bold' }
        },
        grid: {
            left: 0,
            right: '1.2%',
            top: '12%',
            bottom: '0%',
            containLabel: false
        },
        xAxis: {
            type: 'category',
            data: dateList,
            boundaryGap: [0, 0.25],
            axisLabel: {
                rotate: 90,
                fontSize: 9,
                color: '#666',
                interval: 4,
                margin: 0
            },
            axisTick: { show: false },
            axisLine: { show: false }
        },
        yAxis: {
            type: 'value',
            min: yMin,
            max: yMax,
            boundaryGap: [0, 0],
            axisLabel: {
                inside: true,
                position: 'left',
                fontSize: 11,
                fontWeight: 'bold',
                color: '#666'
            },
            splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } },
            axisLine: { show: false }
        },
        series: series,
        dataZoom: [
            {
                type: 'inside',
                zoomOnMouseWheel: true,
                moveOnMouseMove: true,
                moveOnMouseWheel: false,
                preventDefaultMouseMove: false
            }
        ]
    };
    myChart.setOption(option);
}

// 窗口自适应
window.addEventListener('resize', () => myChart.resize());

// 启动程序
main();
</script>
</body>
</html>
