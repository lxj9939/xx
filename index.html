<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>指数红绿灯 - 复刻支付宝估值</title>
    <!-- 引入 ECharts CDN -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:Microsoft Yahei;}
        body{background:#f5f6f7;padding:15px;}
        h2{text-align:center;margin-bottom:20px;color:#333;}
        #chart{width:100%;height:420px;background:#fff;border-radius:8px;padding:10px;}
        .table-box{margin-top:20px;background:#fff;border-radius:8px;padding:10px;overflow-x:auto;}
        table{width:100%;border-collapse:collapse;text-align:center;}
        th,td{padding:12px;border:1px solid #eee;}
        th{background:#f0f2f5;}
        /* 红绿灯样式 */
        .low{color:#00b42a;font-weight:bold;}
        .mid{color:#ff7d00;font-weight:bold;}
        .high{color:#f53f3f;font-weight:bold;}
    </style>
</head>
<body>
    <h2>指数估值红绿灯（复刻支付宝）</h2>
    <div id="chart"></div>

    <div class="table-box">
        <table>
            <thead>
                <tr>
                    <th>指数名称</th>
                    <th>当前PE</th>
                    <th>估值分位(近5年)</th>
                    <th>状态</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

<script>
// 1. 模拟指数估值数据（可替换为真实接口）
const indexData = [
    {name: "沪深300", pe: 11.25, percent: 22},
    {name: "中证500", pe: 18.62, percent: 28},
    {name: "创业板指", pe: 35.10, percent: 76},
    {name: "中证消费", pe: 32.45, percent: 65},
    {name: "中证医药", pe: 24.80, percent: 41},
    {name: "中证新能源", pe: 42.33, percent: 82}
];

// 2. 生成表格 + 红绿灯标签
const tableBody = document.getElementById('tableBody');
indexData.forEach(item => {
    let status, cls;
    if(item.percent < 30){
        status = "低估 🟢"; cls = "low";
    }else if(item.percent < 70){
        status = "中性 🟡"; cls = "mid";
    }else{
        status = "高估 🔴"; cls = "high";
    }
    const tr = document.createElement('tr');
    tr.innerHTML = `
        <td>${item.name}</td>
        <td>${item.pe}</td>
        <td class="${cls}">${item.percent}%</td>
        <td class="${cls}">${status}</td>
    `;
    tableBody.appendChild(tr);
});

// 3. ECharts 绘制估值折线图（复刻支付宝走势）
const myChart = echarts.init(document.getElementById('chart'));
const xData = indexData.map(d => d.name);
const yData = indexData.map(d => d.percent);

const option = {
    tooltip: {trigger: 'axis'},
    grid: {left: '3%', right: '4%', bottom: '3%', containLabel: true},
    xAxis: {
        type: 'category',
        data: xData,
        axisLabel: {rotate: 15}
    },
    yAxis: {
        type: 'value',
        name: '估值分位(%)',
        max: 100,
        splitLine: {lineStyle: {type: 'dashed'}}
    },
    series: [
        {
            name: '估值分位',
            type: 'line',
            data: yData,
            smooth: true,
            symbol: 'circle',
            symbolSize: 8,
            lineStyle: {width: 2},
            areaStyle: {opacity: 0.15}
        }
    ],
    // 参考线：30%低估线、70%高估线（支付宝同款）
    markLine: {
        silent: true,
        data: [
            {yAxis: 30, name: '低估线'},
            {yAxis: 70, name: '高估线'}
        ],
        lineStyle: {color: '#999', type: 'dashed'}
    }
};

myChart.setOption(option);
window.addEventListener('resize', ()=>myChart.resize());
</script>
</body>
</html>
