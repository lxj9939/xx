<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>指数红绿灯 - 行情图表</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "PingFang SC", "Microsoft Yahei", sans-serif;
        }
        body {
            background-color: #f5f6f8;
            padding: 12px;
        }
        .chart-item {
            width: 100%;
            height: 600px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .tip {
            margin-bottom: 8px;
            color: #666;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="tip">加载中，正在获取行情数据...</div>
    <div id="chartContainer" class="chart-item"></div>

<script>
const chartDom = document.getElementById('chartContainer');
const tipDom = document.querySelector('.tip');
let myChart = echarts.init(chartDom);
const lineColor = ['#00b42a','#73c000','#ffd700','#ff7d00','#f53f3f'];

// 指数列表
const indexList = [
    { name: "沪深300", code: "1.000300" },
    { name: "中证500", code: "1.000905" },
    { name: "创业板指", code: "0.399006" },
    { name: "中证消费", code: "1.000932" },
    { name: "中证医药", code: "1.000933" },
    { name: "半导体", code: "1.931786" },
    { name: "新能源", code: "1.931151" },
    { name: "银行", code: "1.931787" },
    { name: "券商", code: "1.931785" },
    { name: "白酒", code: "1.931817" },
    { name: "军工", code: "1.931066" },
    { name: "地产", code: "1.931775" }
];

// 估值五档分级
function getLevel(val, min, max) {
    if (max === min) return 2;
    const pct = (val - min) / (max - min) * 100;
    if (pct < 20) return 0;
    if (pct < 40) return 1;
    if (pct < 60) return 2;
    if (pct < 80) return 3;
    return 4;
}

// 带超时的JSONP请求
function jsonpWithTimeout(url, timeout = 5000) {
    return new Promise((resolve, reject) => {
        const cbName = 'jsonpCb_' + Date.now();
        let timer = setTimeout(() => {
            cleanup();
            reject('请求超时');
        }, timeout);

        window[cbName] = (res) => {
            cleanup();
            resolve(res);
        };

        function cleanup() {
            clearTimeout(timer);
            delete window[cbName];
            const script = document.querySelector(`script[src*="${cbName}"]`);
            if (script) document.body.removeChild(script);
        }

        const script = document.createElement('script');
        script.src = `${url}&callback=${cbName}`;
        script.onerror = () => {
            cleanup();
            reject('接口异常');
        };
        document.body.appendChild(script);
    });
}

// 东方财富接口获取单指数数据
async function getEastMoneyData(code) {
    const url = `https://push2.eastmoney.com/api/qt/stock/kline/get?secid=${code}&fields1=f1&fields2=f51,f53&klt=101&fqt=0&beg=0&end=0`;
    const res = await jsonpWithTimeout(url);
    if (!res?.data?.klines) return [];
    return res.data.klines.slice(-365);
}

// 生成兜底模拟数据（接口失效时使用）
function generateMockData(days = 365) {
    tipDom.innerText = "公共接口请求失败，已加载模拟行情数据";
    const dateList = [];
    const now = new Date();
    const level0 = [], level1 = [], level2 = [], level3 = [], level4 = [];

    for (let i = days - 1; i >= 0; i--) {
        const d = new Date(now.getTime() - i * 24 * 3600 * 1000);
        const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        dateList.push(dateStr);
        // 随机模拟各档位数量
        level0.push(Math.floor(Math.random() * 4) + 1);
        level1.push(Math.floor(Math.random() * 4) + 2);
        level2.push(Math.floor(Math.random() * 4) + 3);
        level3.push(Math.floor(Math.random() * 4) + 2);
        level4.push(Math.floor(Math.random() * 4) + 1);
    }
    return { dateList, level0, level1, level2, level3, level4 };
}

// 主入口：优先真实接口，失败走兜底
async function main() {
    try {
        let allRecord = [];
        // 逐个拉取指数，单个失败不中断整体
        for (const item of indexList) {
            try {
                const klineList = await getEastMoneyData(item.code);
                if (klineList.length === 0) continue;

                const dateArr = [];
                const valArr = [];
                klineList.forEach(k => {
                    const [date, close] = k.split(',');
                    dateArr.push(date);
                    valArr.push(parseFloat(close));
                });

                const minVal = Math.min(...valArr);
                const maxVal = Math.max(...valArr);
                dateArr.forEach((date, idx) => {
                    const level = getLevel(valArr[idx], minVal, maxVal);
                    allRecord.push({ date, level });
                });
            } catch (e) {
                console.log(`${item.name} 数据获取失败`, e);
                continue;
            }
        }

        // 无任何有效真实数据，启用兜底
        if (allRecord.length === 0) {
            const mock = generateMockData(365);
            renderChart(mock.dateList, mock.level0, mock.level1, mock.level2, mock.level3, mock.level4);
            return;
        }

        tipDom.innerText = "真实行情数据加载完成";
        // 按日期聚合统计
        const dateSet = [...new Set(allRecord.map(d => d.date))].sort();
        const level0 = [], level1 = [], level2 = [], level3 = [], level4 = [];
        dateSet.forEach(date => {
            const dayData = allRecord.filter(d => d.date === date);
            level0.push(dayData.filter(d => d.level === 0).length);
            level1.push(dayData.filter(d => d.level === 1).length);
            level2.push(dayData.filter(d => d.level === 2).length);
            level3.push(dayData.filter(d => d.level === 3).length);
            level4.push(dayData.filter(d => d.level === 4).length);
        });
        renderChart(dateSet, level0, level1, level2, level3, level4);
    } catch (err) {
        console.error('整体请求异常', err);
        const mock = generateMockData(365);
        renderChart(mock.dateList, mock.level0, mock.level1, mock.level2, mock.level3, mock.level4);
    }
}

// 渲染图表（完全保留原有样式）
function renderChart(dateList, l0, l1, l2, l3, l4) {
    const last0 = l0.at(-1) || 0;
    const last1 = l1.at(-1) || 0;
    const last2 = l2.at(-1) || 0;
    const last3 = l3.at(-1) || 0;
    const last4 = l4.at(-1) || 0;

    const seriesName = [
        `极低估：${last0}`,
        `低估：${last1}`,
        `中性：${last2}`,
        `高估：${last3}`,
        `极高估：${last4}`
    ];

    const series = [l0, l1, l2, l3, l4].map((data, idx) => ({
        name: seriesName[idx],
        type: 'line',
        data: data,
        smooth: true,
        symbol: 'none',
        lineStyle: { width: 1.8, color: lineColor[idx] }
    }));

    const allData = [...l0, ...l1, ...l2, ...l3, ...l4];
    const yMin = Math.min(...allData);
    const yMax = Math.max(...allData);

    const option = {
        title: {
            text: '全行业五档估值数量统计',
            left: 'left',
            top: 0,
            textStyle: { fontSize: 14, fontWeight: 'bold' }
        },
        tooltip: { trigger: 'axis' },
        legend: {
            data: seriesName,
            top: 0,
            right: 10,
            textStyle: { fontSize: 12, fontWeight: 'bold' }
        },
        grid: {
            left: 0,
            right: '1.2%',
            top: '12%',
            bottom: '0%',
            containLabel: false
        },
        xAxis: {
            type: 'category',
            data: dateList,
            boundaryGap: [0, 0.25],
            axisLabel: {
                rotate: 90,
                fontSize: 9,
                color: '#666',
                interval: 4,
                margin: 0
            },
            axisTick: { show: false },
            axisLine: { show: false }
        },
        yAxis: {
            type: 'value',
            min: yMin,
            max: yMax,
            boundaryGap: [0, 0],
            axisLabel: {
                inside: true,
                position: 'left',
                fontSize: 11,
                fontWeight: 'bold',
                color: '#666'
            },
            splitLine: { lineStyle: { type: 'dashed', color: '#f0f0f0' } },
            axisLine: { show: false }
        },
        series: series,
        dataZoom: [
            {
                type: 'inside',
                zoomOnMouseWheel: true,
                moveOnMouseMove: true,
                moveOnMouseWheel: false,
                preventDefaultMouseMove: false
            }
        ]
    };
    myChart.setOption(option);
}

// 窗口自适应
window.addEventListener('resize', () => myChart.resize());

// 启动
main();
</script>
</body>
</html>
