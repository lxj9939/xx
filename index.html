const dates = rawData.map(d => d.date);
const plateNames = Object.keys(rawData[0]).filter(k => k !== "date");
const traces = [];
const shapes = [];

// 画各板块折线
plateNames.forEach((name, i) => {
    const y = rawData.map(d => d[name]);
    traces.push({
        x: dates,
        y: y,
        name: name,
        type: "scatter",
        mode: "lines",
        line: {width: 2}
    });
});

// 红绿背景
for (let i = 0; i < rawData.length - 1; i++) {
    const curr = rawData[i];
    const next = rawData[i+1];
    const vals = plateNames.map(p => curr[p]);

    if (vals.some(v => v > OVER_THRESHOLD)) {
        shapes.push({
            type: "rect",
            x0: curr.date, x1: next.date,
            y0: 0, y1: 100,
            fillcolor: "rgba(255,0,0,0.15)",
            line: {width:0}
        });
    }
    if (vals.some(v => v < LOW_THRESHOLD)) {
        shapes.push({
            type: "rect",
            x0: curr.date, x1: next.date,
            y0: 0, y1: 100,
            fillcolor: "rgba(0,180,0,0.15)",
            line: {width:0}
        });
    }
}

const layout = {
    title: {
        text: "A股板块真实估值分位图（2026-01至06）<br><sup>红=高估>80%｜绿=低估<20%｜点击日期统计</sup>",
        font: {size:18}
    },
    xaxis: {title:"日期", type:"date", tickangle:-45},
    yaxis: {title:"估值分位（%）", range:[0,100]},
    hovermode:"x unified",
    shapes: shapes,
    legend: {orientation:"h", yanchor:"bottom", y:1.02, xanchor:"right", x:1},
    dragmode: false  // 禁用框选、拖拽放大/缩小
};

Plotly.newPlot("chart", traces, layout);

// 点击统计
document.getElementById("chart").on("plotly_click", function(data) {
    const clickDate = data.points[0].x;
    const row = rawData.find(d => d.date === clickDate);
    if (!row) return;

    const vals = plateNames.map(p => row[p]);
    const over = vals.filter(v => v > OVER_THRESHOLD).length;
    const low  = vals.filter(v => v < LOW_THRESHOLD).length;
    const total = plateNames.length;

    alert(`日期：${clickDate}\n总板块：${total}\n高估(>80%)：${over} 只\n低估(<20%)：${low} 只`);
});
